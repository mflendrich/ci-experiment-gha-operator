name: Reusable Post-Merge Helm

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag / app version (e.g., 'latest', '1.19', '1.20')."
        type: string
        required: true

jobs:
  helm-build:
    name: Build Helm Charts
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags are needed for `git describe` used by the Makefile to derive
          # HELM_CHART_VERSION.
          fetch-depth: 0
          fetch-tags: true

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      # Go and Helm are pre-installed in the golang-1.26 image.

      - name: Build Helm charts
        run: |
          make helm-build HELM_APP_VERSION='${{ inputs.image_tag }}'

      - name: Upload Helm charts
        uses: actions/upload-artifact@v7
        with:
          name: helm-charts-${{ inputs.image_tag }}
          path: helm/build/
          if-no-files-found: error
