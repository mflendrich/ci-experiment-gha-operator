name: PR
# Test: verify PR workflow triggers correctly.

on:
  pull_request:
    branches:
      - master
      - v1.19
      - v1.20

jobs:
  # Detect which files changed to conditionally skip expensive jobs.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!.github/**'
              - '!enhancements/**'
              - '!**/*.md'
              - '!renovate.json'
            docs:
              - 'docs/**'

  pr-checks:
    name: Checks
    needs: []
    uses: ./.github/workflows/_reusable-pr-checks.yaml

  pr-images:
    name: Images
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_reusable-pr-images.yaml
    secrets:
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}

  pr-e2e-kind:
    name: E2E KinD
    needs: [changes, pr-images]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_reusable-pr-e2e-kind.yaml
    with:
      image: ${{ needs.pr-images.outputs.image }}

  e2e-gke-parallel:
    name: E2E GKE Parallel
    needs: [changes, pr-images]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_reusable-pr-e2e-gke.yaml
    with:
      image: ${{ needs.pr-images.outputs.image }}
      suite: scylla-operator/conformance/parallel
      service-type: Headless
      nodes-broadcast-type: PodIP
      clients-broadcast-type: PodIP
      job-suffix: parallel
      create-storage-bucket: true
    secrets:
      MGMT_CLUSTER_KUBECONFIG: ${{ secrets.MGMT_CLUSTER_KUBECONFIG }}

  e2e-gke-serial:
    name: E2E GKE Serial
    needs: [changes, pr-images]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_reusable-pr-e2e-gke.yaml
    with:
      image: ${{ needs.pr-images.outputs.image }}
      suite: scylla-operator/conformance/serial
      service-type: Headless
      nodes-broadcast-type: PodIP
      clients-broadcast-type: PodIP
      job-suffix: serial
      create-storage-bucket: false
      disable-nodeconfig: true
      storage-class-name: "REMOVE"
      local-nvme-ssd-count: 0
    secrets:
      MGMT_CLUSTER_KUBECONFIG: ${{ secrets.MGMT_CLUSTER_KUBECONFIG }}

  e2e-gke-parallel-clusterip:
    name: E2E GKE ClusterIP
    needs: [changes, pr-images]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/_reusable-pr-e2e-gke.yaml
    with:
      image: ${{ needs.pr-images.outputs.image }}
      suite: scylla-operator/conformance/parallel
      service-type: ClusterIP
      nodes-broadcast-type: ServiceClusterIP
      clients-broadcast-type: ServiceClusterIP
      job-suffix: clusterip
      create-storage-bucket: true
    secrets:
      MGMT_CLUSTER_KUBECONFIG: ${{ secrets.MGMT_CLUSTER_KUBECONFIG }}

  e2e-gke-parallel-ipv6:
    name: E2E GKE IPv6
    needs: [changes, pr-images]
    if: contains(github.event.pull_request.labels.*.name, 'test-ipv6')
    uses: ./.github/workflows/_reusable-pr-e2e-gke.yaml
    with:
      image: ${{ needs.pr-images.outputs.image }}
      suite: scylla-operator/conformance/parallel-ipv6
      service-type: Headless
      nodes-broadcast-type: PodIP
      clients-broadcast-type: PodIP
      job-suffix: ipv6
      create-storage-bucket: true
      cluster-network: ci-dual-stack-network
      cluster-stack-type: IPV4_IPV6
    secrets:
      MGMT_CLUSTER_KUBECONFIG: ${{ secrets.MGMT_CLUSTER_KUBECONFIG }}
