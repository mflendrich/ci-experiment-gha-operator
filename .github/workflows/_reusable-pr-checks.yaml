name: Reusable PR Checks

on:
  workflow_call: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    steps:
      - uses: actions/checkout@v4
      - run: make build

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    steps:
      - uses: actions/checkout@v4
      - run: make test-unit

  test-binary:
    name: Binary Test
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    steps:
      - uses: actions/checkout@v4
        with:
          # test-binary verifies the git commit is embedded in the binary.
          # A full checkout is not needed, but we need the exact commit, which
          # actions/checkout provides by default (fetch-depth: 1 still checks
          # out the merge commit with the correct SHA).
          fetch-depth: 1
      - run: make test-binary

  test-envtest:
    name: Envtest
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    steps:
      - uses: actions/checkout@v4
      # ginkgo is pre-installed in the golang-1.26 image.
      - run: make test-envtest

  verify:
    name: Verify
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      # golangci-lint, helm, and operator-sdk (custom fork with aggregated
      # ClusterRole support) are all pre-installed in the golang-1.26 image.
      - run: make verify

  verify-deps:
    name: Verify Dependencies
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    steps:
      - uses: actions/checkout@v4
      - run: make verify-deps

  verify-commits:
    name: Verify Commits
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    # Only runs on pull requests (needs a base ref to compare against).
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to walk commits from base to HEAD.
          fetch-depth: 0
      - name: Verify commit messages
        run: ./hack/.ci/verify-commits.sh "${{ github.event.pull_request.base.sha }}"

  helm-build:
    name: Helm Build
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:golang-1.26
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags are needed for `git describe` used by the Makefile to derive
          # HELM_CHART_VERSION.
          fetch-depth: 0
          fetch-tags: true
      # helm is pre-installed in the golang-1.26 image.
      - run: make helm-build

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:uv-0.10
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags and full history are needed by the version_context_substitutions
          # Sphinx extension (runs `git tag --list`) and sphinx-last-updated-by-git.
          fetch-depth: 0
          fetch-tags: true
      # uv, python, and git are pre-installed in the uv-0.10 image.
      - name: Build docs
        working-directory: docs
        run: |
          make setup
          make dirhtml
          make redirects

  verify-docs:
    name: Verify Docs
    runs-on: ubuntu-latest
    container: quay.io/scylladb/scylla-operator-images:uv-0.10
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags are needed by the version_context_substitutions Sphinx extension.
          fetch-depth: 0
          fetch-tags: true
      # uv, python, and git are pre-installed in the uv-0.10 image.
      - name: Verify docs
        working-directory: docs
        run: |
          make setup
          make verify-uv
      - name: Linkcheck
        working-directory: docs
        run: make linkcheck
